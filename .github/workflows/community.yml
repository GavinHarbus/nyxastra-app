name: Community templates

# Triggers only when community/** changes — keeps the App release pipeline
# quiet and lets contributors get fast feedback on template-only PRs.
on:
  pull_request:
    paths:
      - "community/**"
      - ".github/workflows/community.yml"
  push:
    branches: [main]
    paths:
      - "community/**"
      - ".github/workflows/community.yml"

# PRs from forks run as read-only by default; we only need write
# permission on the gh-pages deploy that runs after merge to main.
# The `lint` job below intentionally never asks for write — that
# means PRs from external forks can never touch repo state.
permissions:
  contents: read

concurrency:
  # Cancel a running workflow when a new commit arrives on the same PR.
  group: community-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint community templates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: community/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r community/scripts/requirements.txt

      # `--check` is lint-only: validates schema (v2), the embedded
      # `community` block (author/license/category/...), scans the
      # prompt body for secrets, and decodes + sanity-checks each
      # embedded cover image.
      - name: Lint
        run: python3 community/scripts/build_community.py --check

      # On PRs, also produce dist/ in dry-run mode and upload covers
      # as an artifact so reviewers can preview the actual gallery
      # images without having to base64-decode the JSON diff in their
      # head. This is the single most useful affordance for review.
      - name: Build dist/ (preview)
        if: github.event_name == 'pull_request'
        run: python3 community/scripts/build_community.py --build

      - name: Upload cover preview
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: cover-preview
          path: community/dist/covers/
          retention-days: 7

  publish:
    name: Build & publish dist/
    needs: lint
    # Only deploy on push to main. Fork PRs never reach this job.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      # Needed to push the gh-pages branch.
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: community/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r community/scripts/requirements.txt

      - name: Build dist/
        run: python3 community/scripts/build_community.py --build

      # Keep an artifact copy for 30 days so we can grab a specific build
      # from the Actions UI if we ever need to debug a regression.
      - name: Upload dist/ as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: community-dist
          path: community/dist/
          retention-days: 30

      # Publish to the gh-pages branch so https://gavinharbus.github.io/
      # nyxastra-app/ serves index.json + covers/ + templates/. The static
      # gallery on gavinschneestudio.org fetches from this URL.
      #
      # First-time setup (one-off, in repo Settings → Pages):
      #   Source: Deploy from a branch  ·  Branch: gh-pages  ·  Folder: / (root)
      - name: Add a no-Jekyll marker
        run: touch community/dist/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: community/dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: "nyxastra-community-bot"
          user_email: "community-bot@gavinschneestudio.org"
          commit_message: "deploy: community/dist (${{ github.sha }})"

      # Notify the marketing site repo (gavinschneestudio) that the
      # community gallery has new artifacts to mirror. The marketing
      # site reverse-syncs from gh-pages into its own repo so the
      # production site (Azure SWA, accessible from China) can serve
      # the gallery same-origin instead of relying on github.io
      # (which is unreliable in China).
      #
      # The PAT only needs `Contents: Read and write` on the single
      # `gavinschneestudio` repo. If this step ever fails (token
      # rotated, repo renamed, etc.), the marketing site has its own
      # hourly schedule + manual button as fallbacks, so we don't
      # block the gh-pages deploy on it.
      - name: Notify marketing site to resync
        if: success()
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GAVINSCHNEESTUDIO_DISPATCH_TOKEN }}
          repository: GavinHarbus/gavinschneestudio
          event-type: community-updated
          client-payload: |
            {
              "source_sha": "${{ github.sha }}",
              "source_run_id": "${{ github.run_id }}"
            }
