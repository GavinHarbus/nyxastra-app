name: Community templates

# Triggers only when community/** changes — keeps the App release pipeline
# quiet and lets contributors get fast feedback on template-only PRs.
on:
  pull_request:
    paths:
      - "community/**"
      - ".github/workflows/community.yml"
  push:
    branches: [main]
    paths:
      - "community/**"
      - ".github/workflows/community.yml"

# Need write permission so the intake job can push the unpacked
# .nyxtemplate back into the contributor's PR branch.
permissions:
  contents: write
  pull-requests: write

concurrency:
  # Cancel a running workflow when a new commit arrives on the same PR.
  group: community-${{ github.ref }}
  cancel-in-progress: true

jobs:
  intake:
    # Only auto-unpack on a PR (not on `main` push). On `main` the inbox
    # should already be empty because intake ran during the PR.
    if: github.event_name == 'pull_request'
    name: Process community/submissions/
    runs-on: ubuntu-latest
    outputs:
      unpacked: ${{ steps.intake.outputs.unpacked }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          # Need the token to push back to the PR branch.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: community/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r community/scripts/requirements.txt

      - name: Detect pending submissions
        id: pending
        run: |
          shopt -s nullglob
          files=(community/submissions/*.nyxtemplate)
          echo "count=${#files[@]}" >> "$GITHUB_OUTPUT"

      - name: Unpack submissions
        id: intake
        if: steps.pending.outputs.count != '0'
        run: |
          python3 community/scripts/intake_submissions.py
          echo "unpacked=true" >> "$GITHUB_OUTPUT"

      - name: Commit unpacked templates back to the PR branch
        if: steps.intake.outputs.unpacked == 'true'
        run: |
          git config user.name  "nyxastra-community-bot"
          git config user.email "community-bot@gavinschneestudio.com"
          git add community/
          if ! git diff --cached --quiet; then
            git commit -m "ci: unpack community submission(s)"
            git push
          fi

  validate:
    name: Lint all templates
    needs: intake
    # Always run, even when the intake job was skipped (push to main).
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: community/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r community/scripts/requirements.txt

      - name: Lint
        run: python3 community/scripts/build_community.py --check

  build:
    name: Build & publish dist/
    needs: validate
    # `always()` is required because `intake` is skipped on push events,
    # and that "skipped" status would otherwise propagate down the
    # `needs` chain (validate → build) and silently skip this job too,
    # even though validate ran successfully via its own `if: always()`.
    if: |
      always() &&
      needs.validate.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: community/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r community/scripts/requirements.txt

      - name: Build dist/
        run: python3 community/scripts/build_community.py --build

      # Keep an artifact copy for 30 days so we can grab a specific build
      # from the Actions UI if we ever need to debug a regression.
      - name: Upload dist/ as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: community-dist
          path: community/dist/
          retention-days: 30

      # Publish to the gh-pages branch so https://gavinharbus.github.io/
      # nyxastra-app/ serves index.json + covers/ + templates/. The static
      # gallery on gavinschneestudio.com fetches from this URL.
      #
      # First-time setup (one-off, in repo Settings → Pages):
      #   Source: Deploy from a branch  ·  Branch: gh-pages  ·  Folder: / (root)
      - name: Add a no-Jekyll marker
        run: touch community/dist/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: community/dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: "nyxastra-community-bot"
          user_email: "community-bot@gavinschneestudio.com"
          commit_message: "deploy: community/dist (${{ github.sha }})"
